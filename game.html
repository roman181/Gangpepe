<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense Game</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #gameCanvas { border: 2px solid black; }
        .controls { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Tower Defense Game</h1>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div class="controls">
        <button id="placeTower">Place Tower</button>
    </div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let towers = [];
        let enemies = [];

        function drawGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            towers.forEach(tower => {
                ctx.fillStyle = 'green';
                ctx.fillRect(tower.x, tower.y, 50, 50);
            });
            // Add logic to draw enemies here
        }

        document.getElementById('placeTower').addEventListener('click', function() {
            const tower = { x: Math.random() * 750, y: Math.random() * 550 };
            towers.push(tower);
            drawGame();
        });

        drawGame();
    </script>
</body>
</html>
